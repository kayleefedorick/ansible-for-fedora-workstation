---
# Fedora Workstation 44 Ansible Playbook
- name: Setup Fedora Workstation 44
  hosts: localhost
  become: true
  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Check if running on Fedora 44
      fail:
        msg: "This playbook only runs on Fedora 44. Current distribution: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
      when: ansible_facts['distribution'] != 'Fedora' or ansible_facts['distribution_version'] != '44'
      tags:
        - always

  tasks:
    - import_tasks: tasks/capture.yml
    - import_tasks: tasks/update.yml
    - import_tasks: tasks/packages.yml
    - import_tasks: tasks/audio.yml
    - import_tasks: tasks/ardour.yml
    - import_tasks: tasks/embedded.yml
    - import_tasks: tasks/rpmfusion.yml
    - import_tasks: tasks/flatpak.yml
    - import_tasks: tasks/cargo.yml
    - import_tasks: tasks/security.yml
    - import_tasks: tasks/systemd.yml
    - import_tasks: tasks/git.yml
    - import_tasks: tasks/gnome.yml
    - import_tasks: tasks/fonts.yml
    - import_tasks: tasks/dotfiles.yml
    - import_tasks: tasks/shell.yml
    - import_tasks: tasks/firefox.yml
    - import_tasks: tasks/pipx.yml

    # Editor
    
    # use Microsoft VS Code
    # - import_tasks: tasks/vscode.yml

    # use VSCodium
    - import_tasks: tasks/vscodium.yml