---
- name: Import RPM Fusion Free GPG key
  ansible.builtin.rpm_key:
    #  https://rpmfusion.org/keys
    key: https://rpmfusion.org/keys?action=AttachFile&do=get&target=RPM-GPG-KEY-rpmfusion-free-fedora-2020
    state: present
  tags:
    - rpmfusion

- name: Import RPM Fusion Nonfree GPG key
  ansible.builtin.rpm_key:
    #  https://rpmfusion.org/keys
    key: https://rpmfusion.org/keys?action=AttachFile&do=get&target=RPM-GPG-KEY-rpmfusion-nonfree-fedora-2020
    state: present
  tags:
    - rpmfusion

- name: Enable RPM Fusion Free repository
  dnf:
    name: "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_facts['distribution_version'] }}.noarch.rpm"
    state: present
    disable_gpg_check: false
  tags:
    - rpmfusion

- name: Enable RPM Fusion Nonfree repository
  dnf:
    name: "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_facts['distribution_version'] }}.noarch.rpm"
    state: present
    disable_gpg_check: false
  tags:
    - rpmfusion

- name: Enable RPM Fusion Nonfree sub-repos (NVIDIA driver, Steam)
  community.general.ini_file:
    path: "/etc/yum.repos.d/rpmfusion-nonfree-{{ item }}.repo"
    section: "rpmfusion-nonfree-{{ item }}"
    option: enabled
    value: "1"
    mode: "0644"
  loop:
    - nvidia-driver
    - steam
  tags:
    - rpmfusion

- name: Install RPM Fusion packages
  dnf:
    name: "{{ rpmfusion_packages }}"
    state: present
    update_cache: true
    allowerasing: true
  tags:
    - packages
    - rpmfusion
    - system
