---
- name: Detect if host is an Apple MacBook
  ansible.builtin.shell: "cat /sys/devices/virtual/dmi/id/product_name || echo 'Unknown'"
  register: mac_model
  changed_when: false
  tags:
    - systemd
    - macbook
    - backlight

- name: Set fact if Apple MacBook
  ansible.builtin.set_fact:
    is_macbook: "{{ 'MacBook' in mac_model.stdout }}"
  tags:
    - systemd
    - macbook
    - backlight

- name: Create wifi-reset systemd sleep script
  #become: true
  ansible.builtin.copy:
    dest: /usr/lib/systemd/system-sleep/wifi-reset
    content: |
      #!/bin/sh
      case "$1" in
        pre)
          # Before sleep
          nmcli networking off
          ;;
        post)
          # After wake
          nmcli networking on
          ;;
      esac
    mode: '0755'
  when: is_macbook | default(false)
  tags:
    - systemd
    - macbook

- name: Check if acpi_backlight=native is already set
  ansible.builtin.shell:
    cmd: grep -q "acpi_backlight=native" /proc/cmdline
  register: backlight_need
  changed_when: false
  failed_when: false
  when: is_macbook | default(false)
  tags:
    - systemd
    - macbook
    - backlight

- name: Fix MacBook backlight (use Intel native driver instead of buggy ACPI)
  ansible.builtin.command:
    cmd: grubby --update-kernel=ALL --args="acpi_backlight=native"
  when:
    - is_macbook | default(false)
    - backlight_need.rc != 0
  tags:
    - systemd
    - macbook
    - backlight

- name: Ensure audio group exists
  ansible.builtin.group:
    name: audio
    state: present
  tags:
    - systemd
    - audio

- name: Add user to audio group for realtime memlock
  ansible.builtin.user:
    name: "{{ current_user }}"
    groups: audio
    append: true
  tags:
    - systemd
    - audio

- name: Ensure user@.service drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/user@.service.d
    state: directory
    mode: "0755"
  tags:
    - systemd
    - audio

- name: Set unlimited memlock system-wide default
  ansible.builtin.file:
    path: "/etc/systemd/{{ item }}.conf.d"
    state: directory
    mode: "0755"
  check_mode: false
  loop:
    - system
    - user
  tags:
    - systemd
    - audio

- name: Set unlimited memlock system-wide default
  ansible.builtin.copy:
    dest: "/etc/systemd/{{ item }}.conf.d/99-audio-memlock.conf"
    content: |
      [Manager]
      DefaultLimitMEMLOCK=infinity
    mode: "0644"
  loop:
    - system
    - user
  register: memlock_defaults
  tags:
    - systemd
    - audio

- name: Add pam_limits to systemd-user PAM for memlock
  ansible.builtin.copy:
    dest: /etc/pam.d/systemd-user
    content: |
      # Used by systemd --user instances.

      -account sufficient pam_systemd_home.so
      account  sufficient pam_unix.so no_pass_expiry
      account  include    system-auth

      session  required   pam_selinux.so close
      session  required   pam_selinux.so nottys open
      session  required   pam_loginuid.so
      session  optional   pam_keyinit.so force revoke
      session  required   pam_namespace.so
      -session optional   pam_systemd_home.so
      session  optional   pam_umask.so silent
      session  include    system-auth
      session  required   pam_limits.so
    mode: "0644"
  tags:
    - systemd
    - audio

- name: Reload systemd if memlock config changed
  ansible.builtin.systemd:
    daemon_reload: true
  when: memlock_defaults.changed
  tags:
    - systemd
    - audio
